async function toDisplayableBlob(file){
  const isHeic = file.type === 'image/heic' || file.type === 'image/heif' || /\.hei[cf]$/i.test(file.name || '');
  if (!isHeic) return file;
  const converted = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.9 });
  return Array.isArray(converted) ? converted[0] : converted;
}

function resizeImage(file, maxW, quality){
  maxW = maxW || 640;
  quality = quality || 0.72;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function callGeminiVision(base64DataUrl){
  const base64 = base64DataUrl.split(',')[1];
  const res = await fetch(GEMINI_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ role: 'user', parts: [
        { inline_data: { mime_type: 'image/jpeg', data: base64 } },
        { text: '請分析這張衣服照片，只回傳一個JSON物件，不要有其他文字、不要markdown符號。格式：{"category":"上衣或下著或洋裝或外套或鞋子或配件擇一","color":"主要顏色","style":"風格，例如休閒/正式/運動/甜美/簡約","season":"適合季節，例如春夏/秋冬/全年","occasion":"適合場合，例如上班/約會/日常/運動"}' }
      ]}]
    })
  });
  const data = await res.json();
  console.log('Gemini 原始回應：', JSON.stringify(data));
  const candidate = data.candidates && data.candidates[0];
  if (!candidate || !candidate.content || !candidate.content.parts) {
    const reason = candidate ? candidate.finishReason : (data.promptFeedback ? data.promptFeedback.blockReason : 'unknown');
    throw new Error('Gemini 未回傳可用內容，原因：' + reason);
  }
  const text = candidate.content.parts.find(p => p.text).text;
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function callGeminiRecommend(occasion, items){
  const simplified = items.map(i => ({ id: i.id, category: i.category, color: i.color, style: i.style, season: i.season, occasion: i.occasion }));
  const res = await fetch(GEMINI_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ role: 'user', parts: [
        { text: `我的衣櫃清單(JSON)：${JSON.stringify(simplified)}\n\n場合：${occasion}\n\n請從清單中挑選一組最適合的穿搭組合。只回傳一個JSON物件，不要有其他文字、不要markdown符號。格式：{"itemIds":["清單中的id"],"reasoning":"30字內的簡短搭配理由"}` }
      ]}]
    })
  });
  const data = await res.json();
  const text = data.candidates[0].content.parts.find(p => p.text).text;
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function loadWardrobe(uidToLoad){
  const snap = await getDocs(collection(db, 'users', uidToLoad, 'closet'));
  const items = [];
  snap.forEach(d => items.push(d.data()));
  return items.sort((a,b) => b.dateAdded - a.dateAdded);
}

async function callPairing(action, extra){
  const idToken = await currentUser.getIdToken();
  const res = await fetch(PAIRING_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ idToken, action, ...extra })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '配對功能發生錯誤');
  return data;
}

async function saveItemRemote(item, base64DataUrl){
  const imgRef = ref(storage, `closet/${currentUser.uid}/${item.id}.jpg`);
  await uploadString(imgRef, base64DataUrl, 'data_url');
  const imageUrl = await getDownloadURL(imgRef);
  const toSave = { ...item, image: imageUrl };
  await setDoc(doc(db, 'users', currentUser.uid, 'closet', item.id), toSave);
  return toSave;
}

async function updateItemTags(item){
  await setDoc(doc(db, 'users', currentUser.uid, 'closet', item.id), item);

async function deleteItemRemote(id){
  await deleteDoc(doc(db, 'users', currentUser.uid, 'closet', id));
  try { await deleteObject(ref(storage, `closet/${currentUser.uid}/${id}.jpg`)); } catch(e) {}
}

        <p class="sub">OCCASION RECOMMENDER</p>

  document.getElementById('wr-signout').addEventListener('click', () => signOut(auth));
  document.getElementById('wr-pairing-btn').addEventListener('click', () => renderPairingModal({}));
  document.getElementById('wr-shuffle-btn').addEventListener('click', shuffleOutfit);
  document.getElementById('wr-apply-ai-btn').addEventListener('click', applyAiRecommendationToOutfit);
  document.getElementById('wr-clear-outfit-btn').addEventListener('click', clearOutfit);
  renderClosetSwitch();
  renderTabs();
  renderGrid();

    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    pendingItem = { id: uid(), rawImage: null };
    renderModal({ step: 'converting' });
    try {
      const displayableFile = await toDisplayableBlob(file);
      const workingImage = await resizeImage(displayableFile, 900, 0.85);
      openModal(workingImage);

      renderModal({});
      alert('這張照片沒辦法讀取，請改用 JPG 或 PNG 格式的照片再試一次。');

function renderClosetSwitch(){
  const container = document.getElementById('wr-closet-switch');
  if (!pairingInfo || !pairingInfo.paired) { container.innerHTML = ''; return; }
  const isMine = viewingUid === currentUser.uid;
  container.innerHTML = `<div class="wr-closet-tabs">
    <button class="wr-closet-tab ${isMine ? 'active' : ''}" data-view="me">我的衣櫃</button>
    <button class="wr-closet-tab ${!isMine ? 'active' : ''}" data-view="partner">${pairingInfo.partnerName || '對方'}的衣櫃</button>
  </div>`;
  container.querySelector('[data-view="me"]').addEventListener('click', () => switchCloset(currentUser.uid));
  container.querySelector('[data-view="partner"]').addEventListener('click', () => switchCloset(pairingInfo.partnerUid));
}

async function switchCloset(uidToView){
  if (uidToView === viewingUid) return;
  viewingUid = uidToView;
  activeTab = '全部';
  outfitSlots = {};
  activePickerCategory = null;
  lastRecommendation = null;
  document.getElementById('wr-grid-container').innerHTML = `<div class="wr-status"><span class="wr-spinner"></span> 載入中...</div>`;
  wardrobe = await loadWardrobe(viewingUid);
  const isOwnCloset = viewingUid === currentUser.uid;
  document.getElementById('wr-toolbar-actions').style.display = isOwnCloset ? '' : 'none';
  renderClosetSwitch();
  renderTabs();
  renderGrid();
  renderOutfitBuilder();
  renderOutfitPicker();
  document.getElementById('wr-result-container').innerHTML = '';
}

function renderTabs(){
  const container = document.getElementById('wr-tabs');
  const tabs = ['全部', ...CATEGORIES];
  container.innerHTML = tabs.map(t => `<button class="wr-tab ${t === activeTab ? 'active' : ''}" data-tab="${t}">${t}</button>`).join('');
  container.querySelectorAll('.wr-tab').forEach(btn => {
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; renderGrid(); renderTabs(); });
  });
}

function renderGrid(){
  const container = document.getElementById('wr-grid-container');
  const filtered = activeTab === '全部' ? wardrobe : wardrobe.filter(i => i.category === activeTab);
  const isOwnCloset = viewingUid === currentUser.uid;
  document.getElementById('wr-count').textContent = `共 ${wardrobe.length} 件`;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="wr-empty">
      <h3>${wardrobe.length === 0 ? '衣櫃還是空的' : '這個分類還沒有衣物'}</h3>
      <p>${isOwnCloset ? '點右上角「＋ 新增衣物」，上傳照片讓 AI 幫你自動分類。' : '對方還沒有加任何衣物。'}</p>
    </div>`;
    return;
  }

  container.innerHTML = `<div class="wr-grid">${filtered.map(item => `
    <div class="wr-card" data-id="${item.id}">
      ${hangerPegSvg()}
      ${isOwnCloset ? `<button class="wr-del" data-del="${item.id}" aria-label="刪除">✕</button>
      <button class="wr-edit" data-edit="${item.id}" aria-label="編輯">✎</button>` : ''}
      <img src="${item.image}" alt="${item.category}" />
      <div class="wr-card-body">
        <div class="wr-card-cat">${item.category}</div>
        <div class="wr-card-tags">
          <span class="wr-tag">${item.color}</span>
          <span class="wr-tag">${item.style}</span>
          <span class="wr-tag">${item.season}</span>
        </div>
      </div>
    </div>
  `).join('')}</div>`;

  container.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.del;
      if (!confirm('確定要從衣櫃移除這件衣物嗎？')) return;
      wardrobe = wardrobe.filter(i => i.id !== id);
      renderGrid();
      await deleteItemRemote(id);
    });
  });

  container.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.edit;
      const item = wardrobe.find(i => i.id === id);
      if (item) openEditModal(item);
    });
  });
}

function renderOutfitBuilder(){
  const slotsContainer = document.getElementById('wr-outfit-slots');
  if (!slotsContainer) return;
  slotsContainer.innerHTML = CATEGORIES.map(cat => {
    const itemId = outfitSlots[cat];
    const item = itemId ? wardrobe.find(i => i.id === itemId) : null;
    if (item) {
      return `<div class="wr-outfit-slot filled" data-slot="${cat}">
        <button class="wr-outfit-slot-remove" data-remove-slot="${cat}" aria-label="移除">✕</button>
        <img src="${item.image}" alt="${cat}" />
        <span class="wr-outfit-fill-label">${cat}</span>
      </div>`;
    }
    return `<div class="wr-outfit-slot empty" data-slot="${cat}">
      <span class="wr-outfit-slot-plus">＋</span>
      <span class="wr-outfit-empty-label">選${cat}</span>
    </div>`;
  }).join('');

  slotsContainer.querySelectorAll('[data-slot]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-remove-slot]')) return;
      const cat = el.dataset.slot;
      activePickerCategory = activePickerCategory === cat ? null : cat;
      renderOutfitPicker();
    });
  });
  slotsContainer.querySelectorAll('[data-remove-slot]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      delete outfitSlots[btn.dataset.removeSlot];
      renderOutfitBuilder();
      renderOutfitPicker();
    });
  });
}

function renderOutfitPicker(){
  const container = document.getElementById('wr-outfit-picker');
  if (!container) return;
  if (!activePickerCategory) { container.innerHTML = ''; return; }
  const options = wardrobe.filter(i => i.category === activePickerCategory);
  if (options.length === 0) {
    container.innerHTML = `<p class="wr-crop-hint" style="padding:6px 0 0;">這個分類還沒有衣物</p>`;
    return;
  }
  container.innerHTML = `<div class="wr-outfit-picker-strip">${options.map(i => `
    <button class="wr-outfit-picker-item" data-pick="${i.id}"><img src="${i.image}" alt="${i.category}" /></button>
  `).join('')}</div>`;
  container.querySelectorAll('[data-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      outfitSlots[activePickerCategory] = btn.dataset.pick;
      activePickerCategory = null;
      renderOutfitBuilder();
      renderOutfitPicker();
    });
  });
}

function shuffleOutfit(){
  CATEGORIES.forEach(cat => {
    const options = wardrobe.filter(i => i.category === cat);
    if (options.length > 0) {
      outfitSlots[cat] = options[Math.floor(Math.random() * options.length)].id;
    }
  });
  activePickerCategory = null;
  renderOutfitBuilder();
  renderOutfitPicker();
}

function applyAiRecommendationToOutfit(){
  if (!lastRecommendation || lastRecommendation.length === 0) {
    alert('目前還沒有 AI 推薦結果，先在下面輸入場合按「推薦搭配」試試看。');
    return;
  }
  lastRecommendation.forEach(item => { outfitSlots[item.category] = item.id; });
  activePickerCategory = null;
  renderOutfitBuilder();
  renderOutfitPicker();
}

function clearOutfit(){
  outfitSlots = {};
  activePickerCategory = null;
  renderOutfitBuilder();
  renderOutfitPicker();
}

let cropBox = { x: 10, y: 10, w: 80, h: 80 };
let isEditing = false;

function openEditModal(item){
  pendingItem = { ...item };
  isEditing = true;
  renderModal({});
}

function clampNum(v, min, max){ return Math.max(min, Math.min(max, v)); }

function openModal(rawPreviewUrl){
  pendingItem = { id: uid(), image: null, rawImage: rawPreviewUrl, category: '上衣', color: '', style: '', season: '', occasion: '', dateAdded: Date.now() };
  isEditing = false;
  cropBox = { x: 10, y: 10, w: 80, h: 80 };
  renderModal({ step: 'crop' });
}

function applyCropBoxStyle(){
  const box = document.getElementById('wr-crop-box');
  if (!box) return;
  box.style.left = cropBox.x + '%';
  box.style.top = cropBox.y + '%';
  box.style.width = cropBox.w + '%';
  box.style.height = cropBox.h + '%';
}

function startCropDrag(e, mode){
  e.preventDefault();
  const container = document.getElementById('wr-crop-container');
  const rect = container.getBoundingClientRect();
  const startX = e.clientX, startY = e.clientY;
  const startBox = { ...cropBox };

  function onMove(ev){
    const dxPct = (ev.clientX - startX) / rect.width * 100;
    const dyPct = (ev.clientY - startY) / rect.height * 100;
    if (mode === 'move') {
      cropBox.x = clampNum(startBox.x + dxPct, 0, 100 - startBox.w);
      cropBox.y = clampNum(startBox.y + dyPct, 0, 100 - startBox.h);
    } else if (mode === 'nw') {
      const newX = clampNum(startBox.x + dxPct, 0, startBox.x + startBox.w - 10);
      const newY = clampNum(startBox.y + dyPct, 0, startBox.y + startBox.h - 10);
      cropBox.w = startBox.w + (startBox.x - newX);
      cropBox.h = startBox.h + (startBox.y - newY);
      cropBox.x = newX; cropBox.y = newY;
    } else if (mode === 'ne') {
      const newY = clampNum(startBox.y + dyPct, 0, startBox.y + startBox.h - 10);
      cropBox.h = startBox.h + (startBox.y - newY);
      cropBox.y = newY;
      cropBox.w = clampNum(startBox.w + dxPct, 10, 100 - startBox.x);
    } else if (mode === 'sw') {
      const newX = clampNum(startBox.x + dxPct, 0, startBox.x + startBox.w - 10);
      cropBox.w = startBox.w + (startBox.x - newX);
      cropBox.x = newX;
      cropBox.h = clampNum(startBox.h + dyPct, 10, 100 - startBox.y);
    } else if (mode === 'se') {
      cropBox.w = clampNum(startBox.w + dxPct, 10, 100 - startBox.x);
      cropBox.h = clampNum(startBox.h + dyPct, 10, 100 - startBox.y);
    }
    applyCropBoxStyle();
  }
  function onUp(){
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
  }
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
}

function confirmCrop(useFullFrame){
  const imgEl = document.getElementById('wr-crop-img');
  const box = useFullFrame ? { x: 0, y: 0, w: 100, h: 100 } : cropBox;
  const sx = imgEl.naturalWidth * box.x / 100;
  const sy = imgEl.naturalHeight * box.y / 100;
  const sw = imgEl.naturalWidth * box.w / 100;
  const sh = imgEl.naturalHeight * box.h / 100;
  const maxW = 640;
  const scale = Math.min(1, maxW / sw);
  const canvas = document.createElement('canvas');
  canvas.width = sw * scale;
  canvas.height = sh * scale;
  canvas.getContext('2d').drawImage(imgEl, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
  const finalDataUrl = canvas.toDataURL('image/jpeg', 0.72);
  pendingItem.image = finalDataUrl;
  renderModal({ loading: true });
  runVisionTagging(finalDataUrl);
}

async function runVisionTagging(previewUrl){
  try {
    const tags = await callGeminiVision(previewUrl);
    pendingItem = { ...pendingItem, ...tags };
    renderModal({ loading: false });
  } catch (e) {
    renderModal({ loading: false, error: 'AI 辨識失敗，請手動輸入標籤後再儲存。' });
  }
}

function renderModal(state){
  const container = document.getElementById('wr-modal-container');
  if (!pendingItem) { container.innerHTML = ''; return; }

  if (state.step === 'converting') {
    container.innerHTML = `<div class="wr-modal-overlay"><div class="wr-modal">
      <h3>處理照片中</h3>
      <div class="wr-status"><span class="wr-spinner"></span> 正在轉換照片格式...</div>
    </div></div>`;
    return;
  }

  if (state.step === 'crop') {
    container.innerHTML = `<div class="wr-modal-overlay"><div class="wr-modal" style="max-width:460px">
      <h3>框選衣服範圍</h3>
      <p class="wr-crop-hint" style="margin-top:-6px; margin-bottom:10px;">拖曳框框調整範圍，盡量只框住衣服本身，避開臉部跟背景，AI 辨識會更準確</p>
      <div class="wr-crop-container" id="wr-crop-container">
        <img id="wr-crop-img" src="${pendingItem.rawImage}" draggable="false" />
        <div class="wr-crop-box" id="wr-crop-box">
          <div class="wr-crop-handle" data-handle="nw"></div>
          <div class="wr-crop-handle" data-handle="ne"></div>
          <div class="wr-crop-handle" data-handle="sw"></div>
          <div class="wr-crop-handle" data-handle="se"></div>
        </div>
      </div>
      <div class="wr-crop-actions">
        <button class="wr-btn-ghost" id="wr-crop-cancel">取消</button>
        <button class="wr-btn-ghost" id="wr-crop-skip">跳過，用原圖</button>
        <button class="wr-btn-primary" id="wr-crop-confirm" style="flex:1">裁切完成，開始辨識</button>
      </div>
    </div></div>`;

    applyCropBoxStyle();
    const boxEl = document.getElementById('wr-crop-box');
    boxEl.addEventListener('pointerdown', (e) => {
      const mode = e.target.dataset.handle || 'move';
      startCropDrag(e, mode);
    });
    document.getElementById('wr-crop-cancel').addEventListener('click', () => { pendingItem = null; renderModal({}); });
    document.getElementById('wr-crop-skip').addEventListener('click', () => confirmCrop(true));
    document.getElementById('wr-crop-confirm').addEventListener('click', () => confirmCrop(false));
    return;
  }

  if (state.loading) {
    container.innerHTML = `<div class="wr-modal-overlay"><div class="wr-modal">
      <h3>新增衣物</h3>
      <img class="preview" src="${pendingItem.image}" />
      <div class="wr-status"><span class="wr-spinner"></span> AI 辨識中...</div>
    </div></div>`;
    return;
  }

  const catOptions = CATEGORIES.map(c => `<option value="${c}" ${pendingItem.category === c ? 'selected' : ''}>${c}</option>`).join('');
  container.innerHTML = `<div class="wr-modal-overlay"><div class="wr-modal">
    <h3>${isEditing ? '編輯衣物標籤' : '確認衣物標籤'}</h3>
    <img class="preview" src="${pendingItem.image}" />
    ${state.error ? `<div class="wr-error">${state.error}</div>` : ''}
    <div class="wr-field"><label>分類</label><select id="wr-field-category">${catOptions}</select></div>
    <div class="wr-field"><label>顏色</label><input id="wr-field-color" value="${pendingItem.color || ''}" /></div>
    <div class="wr-field"><label>風格</label><input id="wr-field-style" value="${pendingItem.style || ''}" /></div>
    <div class="wr-field"><label>適合季節</label><input id="wr-field-season" value="${pendingItem.season || ''}" /></div>
    <div class="wr-field"><label>適合場合</label><input id="wr-field-occasion" value="${pendingItem.occasion || ''}" /></div>
    <div class="wr-modal-actions">
      <button class="wr-btn-ghost" id="wr-cancel-btn">取消</button>
      <button class="wr-btn-primary" id="wr-save-btn" style="flex:1">${isEditing ? '儲存修改' : '加入衣櫃'}</button>
    </div>
  </div></div>`;

  document.getElementById('wr-cancel-btn').addEventListener('click', () => { pendingItem = null; isEditing = false; renderModal({}); });
  document.getElementById('wr-save-btn').addEventListener('click', async () => {
    const saveBtn = document.getElementById('wr-save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = '儲存中...';
    pendingItem.category = document.getElementById('wr-field-category').value;
    pendingItem.color = document.getElementById('wr-field-color').value || '未標示';
    pendingItem.style = document.getElementById('wr-field-style').value || '未標示';
    pendingItem.season = document.getElementById('wr-field-season').value || '未標示';
    pendingItem.occasion = document.getElementById('wr-field-occasion').value || '未標示';
    try {
      if (isEditing) {
        const updated = await updateItemTags(pendingItem);
        const idx = wardrobe.findIndex(i => i.id === updated.id);
        if (idx !== -1) wardrobe[idx] = updated;
      } else {
        const rawImage = pendingItem.image;
        const saved = await saveItemRemote(pendingItem, rawImage);
        wardrobe.unshift(saved);
      }
      pendingItem = null;
      isEditing = false;
      renderModal({});
      renderGrid();
    } catch (e) {
      alert('儲存失敗：' + e.message);
      saveBtn.disabled = false;
      saveBtn.textContent = isEditing ? '儲存修改' : '加入衣櫃';
    }
  });
}

  if (state.closed) { container.innerHTML = ''; return; }

  if (pairingInfo && pairingInfo.paired) {
    container.innerHTML = `<div class="wr-modal-overlay"><div class="wr-modal">
      <h3>與伴侶共用</h3>
      <p style="color:var(--ink-soft); font-size:14px; margin-bottom:16px;">目前已經跟 <strong>${pairingInfo.partnerName || '對方'}</strong> 配對成功，可以在衣櫃上方切換查看彼此的衣物（各自的新增/編輯/刪除還是只有本人能操作）。</p>
      ${state.error ? `<div class="wr-error">${state.error}</div>` : ''}
      <div class="wr-modal-actions">
        <button class="wr-btn-ghost" id="wr-pairing-close">關閉</button>
        <button class="wr-btn-primary" id="wr-unpair-btn" style="flex:1; background:var(--coral)">解除配對</button>
      </div>
    </div></div>`;
    document.getElementById('wr-pairing-close').addEventListener('click', () => renderPairingModal({ closed: true }));
    document.getElementById('wr-unpair-btn').addEventListener('click', async () => {
      if (!confirm('確定要解除配對嗎？解除後就看不到對方的衣櫃了。')) return;
      try {
        await callPairing('unpair');
        pairingInfo = { paired: false };
        if (viewingUid !== currentUser.uid) await switchCloset(currentUser.uid);
        renderClosetSwitch();
        renderPairingModal({ closed: true });
      } catch (e) {
        renderPairingModal({ error: e.message });
      }
    });
    return;
  }

  container.innerHTML = `<div class="wr-modal-overlay"><div class="wr-modal">
    <h3>與伴侶共用衣櫃</h3>
    <p style="color:var(--ink-soft); font-size:14px; margin-bottom:16px;">產生一組配對碼給對方輸入，或輸入對方給你的配對碼，即可互相查看彼此的衣櫃。</p>
    ${state.error ? `<div class="wr-error">${state.error}</div>` : ''}
    ${state.generatedCode ? `
      <div style="text-align:center; background:var(--panel-alt); border-radius:8px; padding:18px; margin-bottom:16px;">
        <div style="font-family:'Space Mono',monospace; font-size:32px; letter-spacing:4px; color:var(--wood); font-weight:700;">${state.generatedCode}</div>
        <p style="font-size:12px; color:var(--ink-soft); margin-top:8px;">把這組數字傳給對方，10 分鐘內有效</p>
      </div>
    ` : `
      <button class="wr-btn-ghost" id="wr-generate-code-btn" style="width:100%; margin-bottom:16px;">產生一組配對碼給對方</button>
    `}
    <div class="wr-field"><label>或輸入對方的配對碼</label><input id="wr-redeem-code-input" placeholder="6 位數字" maxlength="6" /></div>
    <div class="wr-modal-actions">
      <button class="wr-btn-ghost" id="wr-pairing-close">關閉</button>
      <button class="wr-btn-primary" id="wr-redeem-btn" style="flex:1">加入配對</button>
    </div>
  </div></div>`;

  document.getElementById('wr-pairing-close').addEventListener('click', () => renderPairingModal({ closed: true }));
  const generateBtn = document.getElementById('wr-generate-code-btn');
  if (generateBtn) {
    generateBtn.addEventListener('click', async () => {
      try {
        const result = await callPairing('generate');
        renderPairingModal({ generatedCode: result.code });
      } catch (e) {
        renderPairingModal({ error: e.message });
      }
    });
  }
  document.getElementById('wr-redeem-btn').addEventListener('click', async () => {
    const code = document.getElementById('wr-redeem-code-input').value.trim();
    if (!code) return;
    const btn = document.getElementById('wr-redeem-btn');
    btn.disabled = true;
    btn.textContent = '配對中...';
    try {
      const result = await callPairing('redeem', { code });
      pairingInfo = { paired: true, partnerUid: result.partnerUid, partnerName: result.partnerName };
      renderClosetSwitch();
      renderPairingModal({});
    } catch (e) {
      btn.disabled = false;
      btn.textContent = '加入配對';
      renderPairingModal({ error: e.message, generatedCode: state.generatedCode });
    }
  });
}

async function handleRecommend(){
  const occasion = document.getElementById('wr-occasion-input').value.trim();
  const resultContainer = document.getElementById('wr-result-container');
  if (!occasion) return;
  if (wardrobe.length === 0) {
    resultContainer.innerHTML = `<div class="wr-result"><p>衣櫃還沒有衣物，先新增幾件吧！</p></div>`;
    return;
  }
  resultContainer.innerHTML = `<div class="wr-status" style="color:#E4C48C"><span class="wr-spinner"></span> 正在配對搭配...</div>`;
  try {
    const rec = await callGeminiRecommend(occasion, wardrobe);
    const items = (rec.itemIds || []).map(id => wardrobe.find(i => i.id === id)).filter(Boolean);
    lastRecommendation = items;
    resultContainer.innerHTML = `<div class="wr-result">
      <div class="wr-result-items">${items.map(i => `<img src="${i.image}" alt="${i.category}" />`).join('')}</div>
      <p>${rec.reasoning || ''}</p>
      <button class="wr-btn-ghost" id="wr-apply-result-btn" style="margin-top:10px; border-color:var(--brass-light); color:var(--panel);">套用到試搭工作台</button>
    </div>`;
    document.getElementById('wr-apply-result-btn').addEventListener('click', applyAiRecommendationToOutfit);
  } catch (e) {
    resultContainer.innerHTML = `<div class="wr-result"><p>推薦失敗了，請再試一次。</p></div>`;
  }
}

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (!user) { renderLogin(); return; }
  root.innerHTML = `<div class="wr-login-screen"><div class="wr-spinner" style="width:24px;height:24px;"></div><p>載入衣櫃中...</p></div>`;
  viewingUid = user.uid;
  try { pairingInfo = await callPairing('status'); } catch (e) { pairingInfo = { paired: false }; }
  wardrobe = await loadWardrobe(viewingUid);
  renderApp();
});
</script>
</body>
</html>
